name: Deploy to GitHub Pages

env:
  PROJECT_PATH: HybridImageGenerator.Browser/HybridImageGenerator.Browser.csproj
  OUTPUT_PATH: HybridImageGenerator.Browser/bin/Release/net9.0-browser/publish/wwwroot
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install wasm-tools
        run: dotnet workload install wasm-tools-net9

      - name: Restore wasm-tools
        run: dotnet workload restore

      - name: Publish
        run: dotnet publish $PROJECT_PATH -c Release

      - name: Add .nojekyll
        run: touch $OUTPUT_PATH/.nojekyll

      - name: Commit to brach
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: github-pages
          folder: ${{ env.OUTPUT_PATH }}
          single-commit: true